apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: prow
spec:
  background: false
  rules:
    - name: add-prow-sidecar-creds
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE # we want to ignore prow update operations
      preconditions:
        all:
          - key: '{{request.object.metadata.labels."created-by-prow" || ""}}'
            operator: Equals
            value: "true"
          - key: initupload
            operator: In
            value: "{{ request.object.spec.initContainers[].name || `[]` }}"
          - key: test
            operator: In
            value: "{{ request.object.spec.containers[].name || `[]` }}"
          - key: sidecar
            operator: In
            value: "{{ request.object.spec.containers[].name || `[]` }}"
      mutate:
        foreach:
          - list: "request.object.spec.initContainers[?name=='clonerefs'] || `[]`"
            patchStrategicMerge:
              spec:
                initContainers:
                  # pod order matters
                  - name: clonerefs
                  - (name): "initupload"
                    # prow passes the json path directly, uncomment this once the feature is disabled in prow
                    # env:
                    #   - name: GOOGLE_APPLICATION_CREDENTIALS
                    #     value: /etc/google/adc.json
                    volumeMounts: &volumeMounts
                      - mountPath: /var/run/secrets/google-iam-token/serviceaccount
                        name: google-iam-token
                        readOnly: true
                      - mountPath: /etc/google
                        name: google-adc
                        readOnly: true
                containers: &containers
                  - name: test
                  - (name): sidecar
                    # prow passes the json path directly, uncomment this once the feature is disabled in prow
                    # env:
                    #   - name: GOOGLE_APPLICATION_CREDENTIALS
                    #     value: /etc/google/adc.json
                    volumeMounts:
                      - mountPath: /var/run/secrets/google-iam-token/serviceaccount
                        name: google-iam-token
                        readOnly: true
                      - mountPath: /etc/google
                        name: google-adc
                        readOnly: true
                volumes: &volumes
                  - name: google-iam-token
                    projected:
                      defaultMode: 420
                      sources:
                        - serviceAccountToken:
                            audience: sts.googleapis.com
                            expirationSeconds: 86400
                            path: token
                  - name: google-adc
                    configMap:
                      name: google-adc
          - list: "request.object.spec.initContainers[?name=='initupload'] || `[]`"
            preconditions:
              all:
                - key: clonerefs
                  operator: NotIn
                  value: "{{ request.object.spec.initContainers[].name || `[]` }}"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "initupload"
                    env:
                      - name: GOOGLE_APPLICATION_CREDENTIALS
                        value: /etc/google/adc.json
                    volumeMounts: *volumeMounts
                containers: *containers
                volumes: *volumes
